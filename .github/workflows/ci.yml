name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile and test
        working-directory: backend
        run: mvn -B verify

      - name: Upload jar artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload dist artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  ml-service:
    name: ML service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ml-service/requirements.txt

      - name: Install runtime deps (CPU torch)
        working-directory: ml-service
        run: |
          pip install --index-url https://download.pytorch.org/whl/cpu torch==2.4.1 torchvision==0.19.1
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check
        working-directory: ml-service
        run: python -m compileall -q app

      - name: Smoke import test
        working-directory: ml-service
        run: |
          python - <<'PY'
          from app.classifier import StyleClassifier
          from app.config import settings
          c = StyleClassifier()
          assert c.styles == settings.styles
          assert c.use_heuristic is True
          print("classifier ok, heuristic_mode =", c.use_heuristic)
          PY

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend, ml-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: false
          tags: psc-backend:ci

      - name: Build ml-service image
        uses: docker/build-push-action@v6
        with:
          context: ./ml-service
          push: false
          load: false
          tags: psc-ml:ci
